name: PR

on:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run fixture:typecheck
      - run: npm run fixture:test
      - run: npm run scheduler:typecheck
      - run: npm run scheduler:test
      - run: npm run verify:clean
