name: Deploy public sample report

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm run demo
      - run: node -e "require('./dist/src/pages').stagePagesSample('examples/demo-run', process.env.RUNNER_TEMP + '/arena-pages').catch(error => { console.error(error); process.exit(1); })"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/arena-pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
