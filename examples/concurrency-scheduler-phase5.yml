# Phase 5 preparation only. Replace every REPLACE_* value, run preview, then
# perform the documented bounded route diagnostics before any human-run trial.
id: phase5-concurrency-scheduler
repository: REPLACE_REPOSITORY
baseline_ref: REPLACE_CONCURRENCY_SCHEDULER_BASELINE
task_contract: >-
  Implement the concurrency-limited TaskScheduler while preserving its class API.
  Enforce the configured concurrency limit and FIFO ready-task ordering; reject
  duplicate active IDs; support queued and cooperative running cancellation;
  retry no more than maxAttempts without exceeding concurrency; drain only when
  work is complete; propagate final task errors; add no dependencies or network access.
allowed_paths:
  - fixtures/concurrency-scheduler/src
  - fixtures/concurrency-scheduler/tests
forbidden_paths:
  - fixtures/concurrency-scheduler/acceptance
  - fixtures/concurrency-scheduler/package.json
  - package.json
  - package-lock.json
  - src
  - examples
validation_commands:
  - [npm, run, scheduler:typecheck]
  - [npm, run, scheduler:test]
acceptance_command: [npm, run, scheduler:acceptance]
diagnostic_probe:
  path: fixtures/concurrency-scheduler/src/arena-write-probe.txt
  content: "phase5-diagnostic-probe\n"
validation_timeout_ms: 180000
dependency_policy: no_changes
timeout_ms: 900000
retry_policy:
  max_launch_transport_retries: 1
manual_intervention: forbidden
provenance:
  phase: 5-preparation
  fixture: concurrency-scheduler
